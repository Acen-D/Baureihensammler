# Signiertes Release-APK bauen (eigener CI-Keystore — nicht dein lokaler Play-Upload-Key).
#
# GitHub → Settings → Environments → „android-release“ anlegen → Environment secrets:
#   ANDROID_CI_KEYSTORE_BASE64   .jks als eine Zeile Base64 (ohne Zeilenumbrüche),
#                                  Linux:       base64 -w0 ci-upload.jks
#                                  PowerShell:  [Convert]::ToBase64String([IO.File]::ReadAllBytes("ci-upload.jks"))
#   ANDROID_CI_KEYSTORE_PASSWORD
#   ANDROID_CI_KEY_PASSWORD
#   ANDROID_CI_KEY_ALIAS           z. B. ci
#
# Optional: Deployment branches / Required reviewers im Environment nutzen.
#
# Keystore nur für CI (lokal):
#   keytool -genkeypair -v -keystore ci-upload.jks -alias ci -keyalg RSA -keysize 4096 -validity 10000

name: Build signed release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: android-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.1.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode CI keystore
        env:
          ANDROID_CI_KEYSTORE_BASE64: ${{ secrets.ANDROID_CI_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_CI_KEYSTORE_BASE64" | base64 -d > ci-upload.jks

      - name: Write keystore.properties
        env:
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
        run: |
          printf '%s\n' 'storeFile=ci-upload.jks' > keystore.properties
          printf 'storePassword=%s\n' "$ANDROID_CI_KEYSTORE_PASSWORD" >> keystore.properties
          printf 'keyAlias=%s\n' "$ANDROID_CI_KEY_ALIAS" >> keystore.properties
          printf 'keyPassword=%s\n' "$ANDROID_CI_KEY_PASSWORD" >> keystore.properties

      - name: Assemble release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release-signed
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          archive: false
